# ─── DEFAULT (local dev with H2, no Kafka needed for unit tests) ────────────
spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orders;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: PUBLIC
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 30000
        max.block.ms: 5000
    consumer:
      group-id: order-service
      key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        isolation.level: read_committed

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

app:
  kafka:
    topics:
      orders:   orders
      payments: payments
    partitions:
      orders:   6
      payments: 3
    replication-factor: 1
  outbox:
    poll-interval-ms: 2000

---
# ─── DOCKER profile (local docker-compose: real Postgres + Kafka cluster) ───
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/orders_platform?currentSchema=orders
    driver-class-name: org.postgresql.Driver
    username: order_service
    password: order_pw
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: orders
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: kafka-1:29092,kafka-2:29092,kafka-3:29092

app:
  kafka:
    replication-factor: 3

---
# ─── AWS profile (EKS + RDS + self-managed Kafka cluster in EKS) ────────────
spring:
  config:
    activate:
      on-profile: aws
  datasource:
    # Injected from env / secrets in K8s
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: orders
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
  # OAuth2 resource server. JWT issuer URI provided via env so the same
  # build runs against Keycloak, Azure AD, Okta etc. by config alone.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

app:
  kafka:
    replication-factor: 3
