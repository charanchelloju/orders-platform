apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/charanchelloju/orders-platform.git
    targetRevision: main
    path: helm/api-gateway
    helm:
      releaseName: api-gateway
      valueFiles:
        - values.yaml
      parameters:
        - name: replicaCount
          value: "1"
        - name: image.repository
          value: 132656278058.dkr.ecr.ap-south-1.amazonaws.com/api-gateway
        - name: image.tag
          value: "31d877a"
  destination:
    server: https://kubernetes.default.svc
    namespace: orders-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
