apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/charanchelloju/orders-platform.git
    targetRevision: main
    path: helm/redis
    helm:
      releaseName: redis
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: orders-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
