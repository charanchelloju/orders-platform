apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  labels: { app: redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - --maxmemory
            - 64mb
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  labels: { app: redis }
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
