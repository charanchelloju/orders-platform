# Cluster-wide ESO ClusterSecretStore — installed ONCE after ESO is installed.
# Tells External Secrets Operator HOW to talk to AWS Secrets Manager.
#
# Prereqs:
#   1. External Secrets Operator installed (see eso-install.sh)
#   2. IAM role for ESO controller (created by Terraform — module recommended)
#   3. ServiceAccount external-secrets-sa annotated with that role's ARN

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
