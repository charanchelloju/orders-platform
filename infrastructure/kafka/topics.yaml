# Topic definitions managed declaratively by Strimzi's Topic Operator.
# Apply with: kubectl apply -f infrastructure/kafka/topics.yaml
#
# Note: K8s metadata.name must be lowercase RFC1123, so we use
# `orders-dlt` for the K8s resource and `spec.topicName: orders.DLT`
# for the actual Kafka topic name (matching what Spring Kafka publishes to).

apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: orders
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 604800000
    min.insync.replicas: 2
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: payments
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
    min.insync.replicas: 2
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: orders-dlt
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  topicName: orders.DLT          # actual Kafka topic name (Spring publishes here)
  partitions: 6
  replicas: 3
  config:
    retention.ms: 2592000000     # 30 days — keep DLT messages longer
    min.insync.replicas: 2
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: payments-dlt
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  topicName: payments.DLT
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000
    min.insync.replicas: 2
    cleanup.policy: delete
