# PodMonitors telling Prometheus to scrape Strimzi-managed Kafka pods.
# Apply AFTER Kafka cluster is running.

apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kafka-cluster-kafka
  namespace: kafka
  labels:
    release: kube-prometheus-stack            # so Prometheus picks it up
spec:
  selector:
    matchLabels:
      strimzi.io/kind: Kafka
      strimzi.io/cluster: kafka-cluster
      strimzi.io/component-type: kafka
  namespaceSelector:
    matchNames:
      - kafka
  podMetricsEndpoints:
    - path: /metrics
      port: tcp-prometheus
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kafka-cluster-kafka-exporter
  namespace: kafka
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      strimzi.io/kind: Kafka
      strimzi.io/cluster: kafka-cluster
      strimzi.io/name: kafka-cluster-kafka-exporter
  namespaceSelector:
    matchNames:
      - kafka
  podMetricsEndpoints:
    - path: /metrics
      port: tcp-prometheus
      interval: 30s
