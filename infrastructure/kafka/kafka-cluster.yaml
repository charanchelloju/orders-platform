# Strimzi Kafka cluster: 3 brokers + 3 controllers in KRaft mode.
# Resources + storage shrunk to fit on a small t3.small node group.
# In production: bigger memory/storage, replication factor 3, min ISR 2.
#
# Requires Strimzi operator installed in the cluster first:
#   kubectl create namespace kafka
#   kubectl apply -f 'https://strimzi.io/install/latest?namespace=kafka' -n kafka

apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: controller
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  replicas: 3
  roles:
    - controller
  storage:
    type: persistent-claim
    size: 3Gi                         # minimum practical for KRaft metadata
    deleteClaim: false
  resources:
    requests: { memory: 256Mi, cpu: 100m }
    limits:   { memory: 384Mi, cpu: 400m }
  jvmOptions:
    "-Xms": "192m"
    "-Xmx": "192m"
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: broker
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  replicas: 3
  roles:
    - broker
  storage:
    type: persistent-claim
    size: 5Gi                         # demo size; prod would be 100Gi+
    deleteClaim: false
  resources:
    requests: { memory: 512Mi, cpu: 200m }
    limits:   { memory: 768Mi, cpu: 600m }
  jvmOptions:
    "-Xms": "384m"
    "-Xmx": "384m"
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: external
        port: 9094
        type: nodeport
        tls: false
        configuration:
          bootstrap:
            nodePort: 32100
    config:
      auto.create.topics.enable: "false"
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      num.partitions: 6
      log.retention.hours: 168
      log.segment.bytes: 268435456    # 256 MB — smaller segments for low-volume demo
    # ─── Prometheus metrics ───────────────────────────────────────────
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
  entityOperator:
    topicOperator:
      resources:
        requests: { memory: 128Mi, cpu: 50m }
        limits:   { memory: 256Mi, cpu: 300m }
    userOperator:
      resources:
        requests: { memory: 128Mi, cpu: 50m }
        limits:   { memory: 256Mi, cpu: 300m }
  # ─── Kafka Exporter — consumer lag metrics ─────────────────────────
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    resources:
      requests: { memory: 64Mi, cpu: 50m }
      limits:   { memory: 128Mi, cpu: 200m }
