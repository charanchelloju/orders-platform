# Local Kubernetes cluster via kind — 1 control plane + 3 workers.
# Spin up with: kind create cluster --config infrastructure/kind/cluster.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: orders-platform
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 32100        # Kafka external NodePort
        hostPort: 32100
        protocol: TCP
  - role: worker
  - role: worker
  - role: worker
